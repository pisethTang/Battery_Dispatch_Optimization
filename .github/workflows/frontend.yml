name: Deploy Frontend to AWS

on:
  push:
    branches: [ "main" ]
    # Only run this if we actually changed frontend code
    paths:
      - 'frontend/**' 

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    # Define the working directory since your React app is in a subfolder
    defaults:
      run:
        working-directory: ./frontend

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Install Dependencies
      run: npm install

    - name: Build React App
      run: npm run build
      env:
        # Inject the live Render URL during the build!
        # Securely pulls the variable from GitHub Settings!
        VITE_API_BASE_URL: ${{ vars.PROD_API_URL }}        

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-southeast-2 # Change this if your bucket is elsewhere

    - name: Deploy to S3
      run: aws s3 sync frontend/dist s3://${{secrets.S3_BUCKET_NAME}} --delete 

    - name: Invalidate CloudFront Cache
      run: aws cloudfront create-invalidation --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} --paths "/*"
